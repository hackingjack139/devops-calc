input {
  file {
    path => "/usr/share/logstash/logs/calc.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
  }
}

filter {
  # Add timestamp manipulation or other filters if needed
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "calc-logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
